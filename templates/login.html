<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.login.page_title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
            padding: 45px;
            width: 100%;
            max-width: 440px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        h1 {
            color: #333;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: #fafafa;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #aaa;
        }

        .button-group {
            margin-top: 28px;
        }

        button, .btn {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc2626;
            animation: shake 0.5s ease;
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #059669;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
<div class="lang-switcher" style="position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(10px);">
    <a href="/set-language/az" style="text-decoration: none; font-size: 22px; margin-right: 8px; opacity: {% if lang == 'az' %}1{% else %}0.5{% endif %}; transition: opacity 0.3s;" title="Azərbaycanca">🇦🇿</a>
    <a href="/set-language/en" style="text-decoration: none; font-size: 22px; opacity: {% if lang == 'en' %}1{% else %}0.5{% endif %}; transition: opacity 0.3s;" title="English">🇬🇧</a>
</div>
<div class="container">
    <div class="header">
        <div class="header-icon">🔐</div>
        <h1>{{ t.login.header }}</h1>
        <p class="subtitle">{{ t.login.subtitle }}</p>
    </div>

    <div id="errorMsg" class="error-message"></div>
    <div id="successMsg" class="success-message"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">{{ t.login.username_label }}</label>
            <input type="text" id="username" name="username" required
                   placeholder="{{ t.login.username_placeholder }}" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">{{ t.login.password_label }}</label>
            <input type="password" id="password" name="password" required
                   placeholder="{{ t.login.password_placeholder }}" autocomplete="current-password">
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary" id="submitBtn">
                <span>{{ t.login.btn_submit }}</span>
            </button>
        </div>
    </form>

    <div class="footer">
        <p style="color: #888; font-size: 14px;">{{ t.login.no_account }}
            <a href="/auth/register-page">{{ t.login.register_link }}</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            errorMsg.textContent = '❌ İstifadəçi adı və şifrəni daxil edin.';
            errorMsg.style.display = 'block';
            return;
        }

        // Show loading
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div><span>{{ t.login.btn_loading }}</span>';

        const payload = new URLSearchParams();
        payload.append('username', username);
        payload.append('password', password);

        try {
            const response = await fetch('/auth/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: payload.toString()
            });

            if (response.ok) {
                const data = await response.json();
                // Cookie-ləri sil və yenisini yaz
                document.cookie = `access_token=${data.access_token}; path=/`;
                successMsg.textContent = '✅ Uğurla daxil oldunuz!';
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/todos/todo-page';
                }, 800);
            } else {
                const errorData = await response.json();
                errorMsg.textContent = '❌ ' + (errorData.detail || 'Daxil olmaq mümkün olmadı.');
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>{{ t.login.btn_submit }}</span>';
            }
        } catch (error) {
            errorMsg.textContent = '❌ Şəbəkə xətası: ' + error.message;
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>{{ t.login.btn_submit }}</span>';
        }
    });
</script>
</body>
</html>
