<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - {{ t.nav.app_name if t else 'Todo App' }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 80px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        h2 { font-size: 24px; margin-bottom: 20px; font-weight: 500; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.9; line-height: 1.5; }
        .btn { display: inline-block; background: white; color: #764ba2; text-decoration: none; padding: 12px 30px; border-radius: 30px; font-weight: 600; font-size: 16px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>{{ 'Səhifə Tapılmadı' if lang == 'az' else 'Page Not Found' }}</h2>
        <p>{{ 'Axtardığınız səhifə mövcud deyil və ya silinmiş ola bilər.' if lang == 'az' else 'The page you are looking for does not exist or may have been removed.' }}</p>
        <a href="/" class="btn">{{ 'Ana Səhifəyə Qayıt' if lang == 'az' else 'Return to Home' }}</a>
    </div>
</body>
</html>
